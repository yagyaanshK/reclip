name: Build Cross-Platform Desktop Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            separator: ":"
          - os: macos-latest
            separator: ":"
          - os: windows-latest
            separator: ";"

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linux GUI Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pillow

    - name: Generate app icons
      run: python make_icons.py

    - name: Build Executable with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: >
        pyinstaller --noconfirm --onefile --windowed
        --add-data "templates${{ matrix.separator }}templates"
        --add-data "static${{ matrix.separator }}static"
        --hidden-import=yt_dlp_ejs
        --collect-all yt_dlp_ejs
        --icon "icons/app.ico"
        --name "ReClip"
        app.py

    - name: Build Executable with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      run: >
        pyinstaller --noconfirm --onefile --windowed
        --add-data "templates${{ matrix.separator }}templates"
        --add-data "static${{ matrix.separator }}static"
        --hidden-import=yt_dlp_ejs
        --collect-all yt_dlp_ejs
        --icon "icons/app.icns"
        --name "ReClip"
        app.py

    - name: Build Executable with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: >
        pyinstaller --noconfirm --onefile --windowed
        --add-data "templates${{ matrix.separator }}templates"
        --add-data "static${{ matrix.separator }}static"
        --hidden-import=yt_dlp_ejs
        --collect-all yt_dlp_ejs
        --icon "icons/app.png"
        --name "ReClip"
        app.py

    - name: Create DMG for macOS
      if: matrix.os == 'macos-latest'
      run: |
        npm install -g create-dmg
        create-dmg dist/ReClip.app dist || true
        mv dist/ReClip*.dmg dist/ReClip-macos.dmg || true

    - name: Prepare Action Artifacts
      shell: bash
      run: |
        mkdir -p deploy_files
        if [ "$RUNNER_OS" == "Windows" ]; then
          cp dist/ReClip.exe deploy_files/
        elif [ "$RUNNER_OS" == "macOS" ]; then
          cp dist/ReClip-macos.dmg deploy_files/
        else
          cp dist/ReClip deploy_files/
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ReClip-${{ matrix.os }}
        path: deploy_files/*
